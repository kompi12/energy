spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA Configuration ---
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB

# --- Database connection (Neon) ---
spring.datasource.url=jdbc:postgresql://ep-odd-wildflower-a4u6z2e4-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require&preferQueryMode=simple
spring.datasource.username=neondb_owner
spring.datasource.password=npg_OwG5YeibD2pm

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA & Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
 # use 'update' only for quick dev; 'validate' when Flyway manages schema
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Flyway (DB migrations) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Logging (optional) ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
